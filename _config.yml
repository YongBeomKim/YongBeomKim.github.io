# Site settings
title:          Tale
description:    "Minimal Jekyll theme for storytellers"
baseurl:        ""
url:            "https://chesterhow.github.io"

# Author
author:
  name:         Chester How
  url:          https://chester.how
  email:        chesterhow@gmail.com

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-paginate

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Scripts / Features
disqus_shortname:
#katex: true # Enable if using math markup
#portfolio: true
search: true
tags: true